<html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jewellery shop</title>
    <style>
    body{
        margin:0;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        background-color: #fffaf7;
        color:rgb(225, 134, 149) ;
    }

    /*navigation*/
    header{
        background-color:#fff;
        padding: 15px 50px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 6px rgb(225, 134, 149);
        position: sticky;
        top: 0%;
        z-index: 100;
    }
    
    header nav a {
        margin: 0 15px;
        color:rgb(225, 134, 149);
        font-weight: 500;
        transition: color 0.3s;
    }

    /*hero section*/
    .hero{
        text-align: center;
        padding: 80px 20px;
        background: url('https://img.freepik.com/free-vector/luxury-beautiful-shining-jewellery-background_1284-12638.jpg?msockid=c18ea22b923511f0a9b0be7ae6ce1a1c')no-repeat center/cover;
        color: white;
    }

    .hero h1{
        font-size: 3rem;
        margin-bottom: 20px;
        text-shadow: 2px 2px 6px rgb(225, 134, 149);
    }

    /*category*/
    .category-box{
        display: flex;
        justify-content: center;
        gap: 40px;
        padding: 60px 20px;
    }

    .category-box{
        background-color: white;
        border: 1px solid #eee;
        border-radius: 10px;
        padding: 40px;
        text-align: center;
        width: 250px;
        box-shadow: 0 4px 10px rgba(0,0,0.1);
        transition: transform 0.3s;
    }

    .category-boxzz:hover{
        transform: translateY(-8px);
    }

    .category-box h2{
        margin-bottom: 15px;
        color:rgb(225, 134, 149);
    }
    .category-box button{
        padding: 10px 20px;
        background-color:rgb(225, 134, 149);
        border: none;
        color: white;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.3s;
    }

    .category-box button:hover{
        background-color: rgb(225, 134, 149);
    }

    /*footer*/
    footer{
        background-color: rgb(225, 134, 149);
        color: #eee;
        text-align: center;
        padding: 20px;
        margin-top: 50px;
    }

    </style>
</head>
<body>
     <!--header -->
     <header>
        <h2>Jewellery Shop </h2>
        <nav>
          <a href="#">Home</a>
          <a href="#">Categories</a>
          <a href="#">About us</a>
          <a href="#">Contect us</a>
        </nav>
     </header>
     
     <!--hero section-->
     <section class="hero">
       <h1>Welcome to our jewellery collection</h1>
       <p>shine with elegance,crafted for you.</p>
     </section>

     <!--categories-->
     <section class="categories">
        <div class="category-box">
            <h2>New Arrives</h2>
            <button>Shop Now</button>
        </div>
        <div class="category-box">
            <h2>Best Sellers</h2>
            <button>Shop Now</button>
        </div>
     </section>

     <!--footer-->
     <footer>
        <p>&copy;2025 Jewellery Shop | All Rights Reserved</p>
     </footer>
</body>
</html>
